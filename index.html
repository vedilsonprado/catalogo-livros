<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Livros</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="brand">
                <h1>Meus Livros</h1>
                </div>
            
            <div class="header-right">
                <div class="search-bar">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="input-busca" placeholder="Buscar livros...">
                </div>
                
                <button id="btn-carrinho" class="cart-icon-container">
                    <i class="fas fa-shopping-cart cart-icon"></i>
                    <span id="contador-carrinho" class="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="catalogo-container" id="catalogo">
            
            </div>
    </main>

    <aside id="menu-carrinho" class="cart-sidebar">
        <div class="cart-header">
            <h2>Seu Carrinho</h2>
            <button id="btn-fechar-carrinho" class="close-cart-btn"><i class="fas fa-times"></i></button>
        </div>
        
        <ul id="lista-carrinho" class="cart-items-list"></ul>
        
        <div class="cart-footer">
            <div class="total-container">
                <h3>Total:</h3>
                <h3>R$ <span id="total-carrinho">0,00</span></h3>
            </div>
            <button id="btn-finalizar-whatsapp" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Finalizar no WhatsApp
            </button>
        </div>
    </aside>

    <script src="js/script.js"></script>
</body>
</html>
